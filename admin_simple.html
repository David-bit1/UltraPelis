<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="supabase-url" content="https://zmmwuwkzpjgsatpbxivh.supabase.co" />
    <meta name="supabase-anon-key" content="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptbXd1d2t6cGpnc2F0cGJ4aXZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MTY4MzEsImV4cCI6MjA5NzM5MjgzMX0.knZ7wJ6YSm1-_BwlaQMV7GhS0O_Pn1cxuEIC1r6QeIE" />
    <meta name="tmdb-api-key" content="b24af203b14e23f8c91844baae37cfab" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body class="admin-page">
    <header class="site-header">
      <a class="brand" href="index.html"><img class="brand-logo" src="img/logo-tipo.png" alt="UltraPelis" /></a>
      <nav class="site-nav">
        <a href="index.html">Inicio</a>
        <a href="peliculas.html">Películas</a>
      </nav>
      <button class="menu-toggle" id="menu-toggle" type="button">☰</button>
    </header>

    <main class="app-shell admin-shell">
      <section class="admin-hero">
        <h1>Administración</h1>
        <p>Gestiona películas con TMDb y Supabase.</p>
      </section>

      <section class="admin-grid">
        <div class="admin-card auth-card">
          <h2>Iniciar sesión</h2>
          <p id="auth-status">Desconectado</p>
          <form id="login-form" class="admin-form">
            <label class="field"><span>Correo</span><input id="login-email" type="email" /></label>
            <label class="field"><span>Contraseña</span><input id="login-password" type="password" /></label>
            <button class="primary-button" type="submit">Entrar</button>
            <button id="logout-button" type="button" hidden>Salir</button>
          </form>
        </div>

        <div class="admin-tmdb-card" id="tmdb-search-card" hidden>
          <h2>TMDb ID</h2>
          <p id="tmdb-status">Escribe un ID</p>
          <label class="field"><input id="tmdb-id" type="number" placeholder="Ej: 550" /></label>
          <button id="fetch-tmdb-btn">Buscar</button>
          <div id="tmdb-previews" hidden>
            <img id="tmdb-poster-img" hidden />
            <p id="tmdb-titulo">-</p>
            <p id="tmdb-anio">-</p>
          </div>
        </div>

        <div class="admin-card form-card">
          <h2 id="form-title">Agregar película</h2>
          <p id="form-status">Listo</p>
          <form id="movie-form" class="admin-form">
            <input type="hidden" id="movie-id" />
            <input type="hidden" id="tmdb-id-hidden" />
            <label class="field"><span>Título</span><input id="titulo" type="text" /></label>
            <label class="field"><span>Año</span><input id="anio" type="number" /></label>
            <label class="field"><span>Género</span><input id="genero" type="text" /></label>
            <label class="field"><span>Sinopsis</span><textarea id="sinopsis"></textarea></label>
            <label class="field"><span>Imagen URL</span><input id="imagen" type="url" /></label>
            <label class="field"><span>Servidor 1 (iframe)</span><input id="iframe" type="url" /></label>
            <label class="field"><span>Servidor 2</span><input id="servidor-2" type="url" /></label>
            <label class="field"><span>Servidor 3</span><input id="servidor-3" type="url" /></label>
            <label class="field"><span>Servidor 4</span><input id="servidor-4" type="url" /></label>
            <button class="primary-button" type="submit">Guardar</button>
            <button id="cancel-edit" type="button" hidden>Cancelar</button>
          </form>
        </div>

        <div class="admin-card list-card">
          <h2>Películas</h2>
          <p id="movie-count">0 películas</p>
          <input id="admin-search" type="search" placeholder="Buscar..." />
          <button id="refresh-button">Actualizar</button>
          <table class="admin-table">
            <thead><tr><th>Título</th><th>Año</th><th>Género</th><th>Acciones</th></tr></thead>
            <tbody id="movies-table"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="admin_simple.js" type="module"></script>
  </body>
</html>
